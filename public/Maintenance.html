<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance | Budlee AI</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Space+Grotesk:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --teal-vivid: hsl(180, 80%, 45%);
            --green-bright: hsl(120, 60%, 45%);
            --bg-dark: #0d1f1a;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient Background Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 30%, rgba(52, 211, 153, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(94, 234, 212, 0.05) 0%, transparent 40%);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .logo-container {
            margin-bottom: 0.75rem;
            position: relative;
            display: inline-block;
        }

        .sparkle-icon {
            width: 100%;
            max-width: 140px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sparkle-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: breathe 4s ease-in-out infinite;
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, var(--teal-vivid) 0%, var(--green-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0 0 2rem 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1.25rem;
            background: rgba(20, 184, 166, 0.1);
            border: 1px solid rgba(20, 184, 166, 0.2);
            border-radius: 2rem;
            font-size: 0.875rem;
            color: #2dd4bf;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2dd4bf;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }

        .footer-text {
            margin-top: 3rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(94, 234, 212, 0.2);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 40px rgba(94, 234, 212, 0.5);
                transform: scale(1.05);
            }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .container {
                padding: 1.5rem;
                width: calc(100% - 2.5rem);
                margin: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="container">
        <div class="logo-container">
            <div class="sparkle-icon">
                <img src="./logo.png" alt="Budlee AI Logo">
            </div>
        </div>

        <h1>Budlee AI</h1>
        <p>We're currently tidying up the classroom. <br>Budlee will be back with you in just a moment!</p>

        <div class="status-badge">
            <div class="status-dot"></div>
            Maintenance in Progress
        </div>

        <div class="footer-text">
            &copy; 2026 Budlee AI
        </div>
    </div>
</body>

</html>
